<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Таргетинг: Таблицы</title>
  <style>
    :root {
      --primary: #2563eb; --bg: #f8fafc; --surface: #ffffff; --text: #0f172a;
      --text-muted: #64748b; --border: #e2e8f0; --hover: #f1f5f9;
      --accent: #10b981; --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-text-size-adjust: 100%; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 1rem 0.5rem; min-height: 100vh; min-height: 100dvh; }
    
    #auth-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 1rem; }
    .auth-box { background: var(--surface); padding: 1.5rem; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.25); width: 100%; max-width: 360px; text-align: center; display: flex; flex-direction: column; gap: 0.75rem; }
    .auth-box h2 { font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--text); }
    .auth-input { width: 100%; padding: 0.875rem 1rem; border: 2px solid var(--border); border-radius: 10px; font: inherit; font-size: 16px; outline: none; transition: border 0.2s; -webkit-appearance: none; }
    .auth-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
    .auth-btn { padding: 0.875rem; font-size: 1rem; font-weight: 600; color: #fff; background: var(--primary); border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; margin-top: 0.5rem; touch-action: manipulation; }
    .auth-btn:active { transform: scale(0.98); }
    .auth-error { color: var(--danger); font-size: 0.85rem; min-height: 1.2rem; opacity: 0; transition: 0.2s; }
    .auth-error.show { opacity: 1; }

    .container { max-width: 1000px; margin: 0 auto; background: var(--surface); border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    
    .tabs-nav { display: flex; align-items: center; gap: 0.5rem; position: relative; }
    .tabs-wrapper { flex: 1; overflow-x: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tabs-wrapper::-webkit-scrollbar { display: none; }
    .tabs { display: flex; gap: 0.5rem; min-width: max-content; padding: 0.25rem 0; }
    .scroll-btn { width: 36px; height: 36px; border: none; background: #e2e8f0; border-radius: 8px; cursor: pointer; font-size: 18px; color: var(--text); display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; touch-action: manipulation; }
    .scroll-btn:disabled { opacity: 0.3; cursor: default; }
    .scroll-btn:not(:disabled):hover { background: #cbd5e1; }
    .scroll-btn:active { transform: scale(0.95); }

    .tab-btn { padding: 0.5rem 0.75rem; font-size: 0.9rem; font-weight: 500; background: transparent; border: 2px solid transparent; border-radius: 10px 10px 0 0; color: var(--text-muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 4px; white-space: nowrap; min-height: 44px; touch-action: manipulation; }
    .tab-btn:active { transform: scale(0.98); }
    .tab-btn:hover { color: var(--text); background: var(--hover); }
    .tab-btn.active { color: var(--primary); background: #eff6ff; border-color: #bfdbfe; }
    .tab-name { max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
    .tab-icon { font-size: 0.75rem; cursor: pointer; padding: 6px; border-radius: 6px; transition: 0.2s; display: flex; align-items: center; justify-content: center; min-width: 28px; min-height: 28px; }
    .tab-edit { color: var(--text-muted); }
    .tab-edit:hover, .tab-edit:active { background: rgba(0,0,0,0.05); color: var(--text); }
    .tab-copy { color: var(--text-muted); }
    .tab-copy:hover, .tab-copy:active { background: rgba(16, 185, 129, 0.15); color: var(--accent); }
    .tab-del { color: var(--text-muted); }
    .tab-del:hover, .tab-del:active { background: rgba(239,68,68,0.15); color: var(--danger); }
    .add-tab-btn { padding: 0.625rem; background: #f1f5f9; border: 2px dashed var(--border); border-radius: 10px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; min-width: 44px; min-height: 44px; margin-left: 0.25rem; touch-action: manipulation; }
    .add-tab-btn:active { transform: scale(0.95); }

    .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; border: 1px solid var(--border); scrollbar-width: thin; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    thead { background: #f8fafc; position: sticky; top: 0; z-index: 10; }
    th, td { padding: 0.75rem 0.625rem; text-align: center; border-bottom: 1px solid var(--border); font-weight: 500; position: relative; font-size: 0.9rem; }
    th { background: #f1f5f9; color: var(--text); cursor: text; white-space: nowrap; }
    td:first-child, th:first-child { text-align: left; font-weight: 600; background: #fafafa; min-width: 140px; position: -webkit-sticky; position: sticky; left: 0; z-index: 5; }
    th:first-child { z-index: 15; }
    tr:active td { background: var(--hover); }
    td.editable { cursor: pointer; transition: 0.2s; min-height: 44px; }
    td.editable:active { background: #eff6ff; }
    td.cell-pos { background-color: #dcfce7; color: #166534; }
    td.cell-neg { background-color: #fee2e2; color: #991b1b; }
    td.cell-x   { background-color: #fef2f2; color: #991b1b; }
    td.cell-t   { background-color: #e0e7ff; color: #3730a3; }
    td.empty    { color: var(--text-muted); font-style: italic; background: #fafafa; }
    .cell-input, .inline-input { width: 100%; padding: 0.5rem 0.625rem; border: 2px solid var(--primary); border-radius: 6px; font: inherit; text-align: center; background: #fff !important; outline: none; font-size: 16px; -webkit-appearance: none; }
    .inline-input { text-align: left; }
    .cell-input:focus, .inline-input:focus { box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
    .del-col-btn { position: absolute; top: 50%; right: 4px; transform: translateY(-50%); width: 32px; height: 32px; font-size: 16px; background: rgba(239, 68, 68, 0.1); border: none; border-radius: 6px; cursor: pointer; color: var(--danger); display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
    .del-col-btn:active { background: var(--danger); color: #fff; }
    .col-add-btn { background: #e2e8f0; border: none; border-radius: 8px; width: 40px; height: 40px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto; transition: 0.2s; touch-action: manipulation; }
    .col-add-btn:active { background: var(--primary); color: #fff; transform: scale(0.95); }
    .add-row-wrapper { text-align: center; padding: 0.5rem 0; }
    .add-row-btn { padding: 0.75rem 1.25rem; font-size: 0.95rem; font-weight: 500; border: 2px dashed var(--border); background: #f8fafc; color: var(--text); border-radius: 10px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; width: 100%; max-width: 280px; justify-content: center; min-height: 48px; touch-action: manipulation; }
    .add-row-btn:active { border-color: var(--primary); color: var(--primary); background: #eff6ff; transform: scale(0.98); }
    .controls { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding-top: 0.5rem; }
    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; width: 100%; }
    .save-btn { padding: 0.875rem 2rem; font-size: 1rem; font-weight: 600; color: #fff; background: var(--primary); border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3); flex: 1; min-width: 140px; min-height: 48px; touch-action: manipulation; }
    .save-btn:active { background: #1d4ed8; transform: scale(0.98); }
    .logout-btn { padding: 0.875rem 1.5rem; font-size: 0.95rem; font-weight: 500; color: var(--danger); background: #fef2f2; border: 2px solid #fecaca; border-radius: 10px; cursor: pointer; transition: 0.2s; flex: 1; min-width: 120px; min-height: 48px; touch-action: manipulation; }
    .logout-btn:active { background: #fee2e2; transform: scale(0.98); }
    .save-msg { font-size: 0.85rem; color: var(--accent); opacity: 0; transition: 0.3s; text-align: center; }
    .save-msg.show { opacity: 1; }
    @media (min-width: 768px) { body { padding: 2rem 1rem; } .container { padding: 1.5rem; border-radius: 16px; } .tabs-nav { justify-content: space-between; } .tab-name { max-width: 160px; } }
    @media (min-width: 1024px) { th, td { padding: 0.75rem 0.8rem; font-size: 0.95rem; } }
    @media (max-width: 360px) { th, td { padding: 0.625rem 0.5rem; font-size: 0.85rem; } td:first-child, th:first-child { min-width: 120px; font-size: 0.85rem; } .auth-box { padding: 1.25rem; } }
  </style>
</head>
<body>

  <div id="auth-overlay">
    <div class="auth-box">
      <h2>🔐 Вход</h2>
      <input type="text" id="auth-user" class="auth-input" placeholder="Логин" autocomplete="username" inputmode="text">
      <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль" autocomplete="current-password" inputmode="text">
      <button id="auth-btn" class="auth-btn">Войти</button>
      <p id="auth-error" class="auth-error"></p>
    </div>
  </div>

  <div class="container" id="main-app" style="display:none;">
    <div class="tabs-nav">
      <button class="scroll-btn" id="scroll-left" disabled>‹</button>
      <div class="tabs-wrapper" id="tabs-wrapper">
        <div class="tabs" id="tabs-container"></div>
      </div>
      <button class="scroll-btn" id="scroll-right">›</button>
    </div>

    <div class="table-wrapper">
      <table id="data-table"><thead><tr id="thead-row"></tr></thead><tbody id="tbody"></tbody></table>
    </div>
    <div class="add-row-wrapper"><button class="add-row-btn" id="add-row-btn">➕ Добавить строку</button></div>
    <div class="controls">
      <div class="btn-row">
        <button id="logout-btn" class="logout-btn">🚪 Выйти</button>
        <button id="save-btn" class="save-btn">💾 Сохранить</button>
      </div>
      <div id="save-msg" class="save-msg"></div>
    </div>
  </div>

  <script>
    const AUTH_CONFIG = { user: 'admin', pass: 'admin' };
    
    // Безопасное хранилище (фоллбэк если localStorage заблокирован)
    const Store = {
      memory: {},
      get(k) { try { return localStorage.getItem(k); } catch { return this.memory[k] || null; } },
      set(k, v) { try { localStorage.setItem(k, v); } catch { this.memory[k] = v; } },
      remove(k) { try { localStorage.removeItem(k); } catch { delete this.memory[k]; } }
    };

    // Универсальный клон (работает на старых iOS/Android)
    const clone = obj => JSON.parse(JSON.stringify(obj));

    function checkAuth() {
      try {
        const u = document.getElementById('auth-user').value.trim();
        const p = document.getElementById('auth-pass').value;
        const errorEl = document.getElementById('auth-error');
        if (u === AUTH_CONFIG.user && p === AUTH_CONFIG.pass) {
          Store.set('authenticated', 'true');
          document.getElementById('auth-overlay').style.display = 'none';
          document.getElementById('main-app').style.display = 'flex';
          render();
        } else {
          errorEl.textContent = u ? 'Неверный логин или пароль' : 'Заполните оба поля';
          errorEl.classList.add('show'); setTimeout(() => errorEl.classList.remove('show'), 2000);
        }
      } catch (err) { alert('Ошибка входа: ' + err.message); }
    }

    document.getElementById('auth-btn').addEventListener('click', checkAuth);
    document.querySelectorAll('.auth-input').forEach(inp => inp.addEventListener('keydown', e => { if(e.key==='Enter') checkAuth(); }));
    document.getElementById('logout-btn').addEventListener('click', () => { Store.remove('authenticated'); location.reload(); });

    const STORAGE_KEY = 'targeting-multi-pages-v4';
    const DEFAULT_PAGE = {
      name: "Таблица 1", headers: ["Targeleon", "Popunder", "Push", "PushInPage"],
      rows: [
        { name: "BY MTS", values: ["", "", "", ""] }, { name: "BY LIFE", values: ["64", "8", "Х", ""] },
        { name: "BY A1", values: ["0", "12", "", "67"] }, { name: "UZ Beeline", values: ["", "", "т", ""] },
        { name: "UZ Mobiuz", values: ["", "", "", ""] }, { name: "UZ Ucell", values: ["", "", "т", ""] },
        { name: "UZ Uzmobile", values: ["", "", "", ""] }, { name: "AM Tcell", values: ["", "", "", ""] },
        { name: "AM Vivacell", values: ["", "", "", ""] }, { name: "RU Megafon", values: ["", "", "", ""] },
        { name: "TJ ZetMobile", values: ["14", "27", "", "187"] }, { name: "TJ Tcell", values: ["", "", "", ""] }
      ]
    };
    const PAGE_TEMPLATE = { name: "Новая страница", headers: ["Targeleon", "Popunder", "Push", "PushInPage"], rows: [{ name: "Новый оператор", values: ["", "", "", ""] }] };

    let activePage = 'page_1';
    let pagesData = { page_1: clone(DEFAULT_PAGE) };

    function loadState() {
      try { 
        const raw = Store.get(STORAGE_KEY);
        if(raw) { 
          const s = JSON.parse(raw); 
          pagesData = s.pages || s; activePage = s.activePage || Object.keys(pagesData)[0]; 
        } 
      } catch {}
    }
    loadState();

    function getCurrentPage() { return pagesData[activePage] || pagesData[Object.keys(pagesData)[0]]; }
    
    function saveData() {
      try {
        Store.set(STORAGE_KEY, JSON.stringify({ pages: pagesData, activePage }));
        const msg = document.getElementById('save-msg');
        msg.textContent = `✅ ${getCurrentPage().name} сохранена!`;
        msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2500);
      } catch(e) { console.warn('Save warning:', e); }
    }

    const scrollWrapper = document.getElementById('tabs-wrapper');
    const scrollLeftBtn = document.getElementById('scroll-left');
    const scrollRightBtn = document.getElementById('scroll-right');

    function updateScrollButtons() {
      if(!scrollWrapper) return;
      scrollLeftBtn.disabled = scrollWrapper.scrollLeft <= 5;
      scrollRightBtn.disabled = scrollWrapper.scrollLeft >= scrollWrapper.scrollWidth - scrollWrapper.clientWidth - 5;
    }

    if(scrollWrapper) {
      scrollWrapper.addEventListener('scroll', updateScrollButtons, { passive: true });
      window.addEventListener('resize', updateScrollButtons);
      scrollLeftBtn.addEventListener('click', () => { scrollWrapper.scrollBy({ left: -150, behavior: 'smooth' }); });
      scrollRightBtn.addEventListener('click', () => { scrollWrapper.scrollBy({ left: 150, behavior: 'smooth' }); });
    }

    function startInlineEdit(element, initialValue, className, onSave) {
      if (element.querySelector('input')) return;
      const originalText = element.textContent;
      element.innerHTML = '';
      const input = document.createElement('input');
      input.type = 'text'; input.value = initialValue; input.className = `inline-input ${className || ''}`; input.inputMode = 'text';
      element.appendChild(input); input.focus(); input.select();
      const finish = () => {
        const val = input.value.trim();
        if (onSave) onSave(val, initialValue);
        else element.textContent = originalText;
      };
      input.addEventListener('blur', finish);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') element.textContent = originalText;
      });
    }

    function renderTabs() {
      const container = document.getElementById('tabs-container');
      container.innerHTML = '';
      const pageIds = Object.keys(pagesData);
      
      pageIds.forEach(key => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${key === activePage ? 'active' : ''}`;
        btn.onclick = () => { activePage = key; render(); };
        
        const nameSpan = document.createElement('span');
        nameSpan.className = 'tab-name'; nameSpan.textContent = pagesData[key].name;
        
        const editIcon = document.createElement('span');
        editIcon.className = 'tab-icon tab-edit'; editIcon.textContent = '✏️'; editIcon.title = 'Переименовать';
        editIcon.onclick = (e) => { e.stopPropagation(); startInlineEdit(nameSpan, pagesData[key].name, '', (v) => { pagesData[key].name = v || "Страница"; saveData(); renderTabs(); }); };

        const copyIcon = document.createElement('span');
        copyIcon.className = 'tab-icon tab-copy'; copyIcon.textContent = '📋'; copyIcon.title = 'Копировать';
        copyIcon.onclick = (e) => { e.stopPropagation(); copyPage(key); };

        const delIcon = document.createElement('span');
        delIcon.className = 'tab-icon tab-del'; delIcon.textContent = '🗑️'; delIcon.title = 'Удалить';
        delIcon.onclick = (e) => { 
          e.stopPropagation(); 
          if(pageIds.length<=1) return alert("Нельзя удалить последнюю!"); 
          if(confirm(`Удалить "${pagesData[key].name}"?`)) { 
            delete pagesData[key]; 
            if(activePage===key) activePage=Object.keys(pagesData)[0]; 
            saveData(); render(); 
          }
        };

        btn.appendChild(nameSpan); btn.appendChild(editIcon); btn.appendChild(copyIcon); btn.appendChild(delIcon);
        container.appendChild(btn);
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'add-tab-btn'; addBtn.textContent = '➕'; addBtn.title = 'Добавить страницу';
      addBtn.onclick = () => {
        const id = 'page_' + Date.now().toString(36);
        pagesData[id] = clone(PAGE_TEMPLATE);
        activePage = id; saveData(); render();
        setTimeout(() => scrollWrapper && (scrollWrapper.scrollLeft = scrollWrapper.scrollWidth), 100);
      };
      container.appendChild(addBtn);
      updateScrollButtons();
    }

    window.copyPage = (sourceKey) => {
      const newId = 'page_' + Date.now().toString(36);
      pagesData[newId] = clone(pagesData[sourceKey]);
      pagesData[newId].name = pagesData[sourceKey].name + ' (копия)';
      activePage = newId; saveData(); render();
    };

    function render() {
      renderTabs();
      const p = getCurrentPage();
      const theadRow = document.getElementById('thead-row');
      const tbody = document.getElementById('tbody');
      theadRow.innerHTML = ''; tbody.innerHTML = '';

      p.headers.forEach((h, idx) => {
        const th = document.createElement('th'); th.textContent = h;
        th.ondblclick = () => startInlineEdit(th, h, '', (v) => { if(v) p.headers[idx]=v; render(); saveData(); });
        if (idx > 0) {
          const btn = document.createElement('button'); btn.className='del-col-btn'; btn.innerHTML='✖'; btn.title='Удалить столбец';
          btn.onclick = () => deleteCol(idx); th.appendChild(btn);
        }
        theadRow.appendChild(th);
      });
      const addTh = document.createElement('th');
      addTh.innerHTML = '<button class="col-add-btn" id="add-col-btn" title="Добавить столбец">➕</button>';
      theadRow.appendChild(addTh);

      p.rows.forEach((row, rIdx) => {
        const tr = document.createElement('tr');
        const nameTd = document.createElement('td'); nameTd.className='editable'; nameTd.dataset.r=rIdx; nameTd.dataset.c=-1; nameTd.textContent=row.name;
        tr.appendChild(nameTd);
        row.values.forEach((val, cIdx) => {
          const td = document.createElement('td'); td.className='editable'; td.dataset.r=rIdx; td.dataset.c=cIdx; styleCell(td, val); tr.appendChild(td);
        });
        tr.appendChild(document.createElement('td')); tbody.appendChild(tr);
      });
    }

    function styleCell(td, val) {
      const raw = val.trim(); td.innerHTML=''; td.classList.remove('cell-pos','cell-neg','cell-x','cell-t','empty');
      if (!raw) { td.textContent='—'; td.classList.add('empty'); return; }
      if (/^-?\d+(\.\d+)?$/.test(raw)) { td.classList.add(raw.startsWith('-') ? 'cell-neg' : 'cell-pos'); td.innerHTML=`<strong>${raw}</strong>`; } 
      else { const l = raw.toLowerCase(); if (l==='х'||l==='x') { td.classList.add('cell-x'); td.innerHTML=`<strong>${raw}</strong>`; } else if (l==='т'||l==='t') { td.classList.add('cell-t'); td.innerHTML=`<strong>${raw}</strong>`; } else { td.textContent=raw; } }
    }

    document.getElementById('data-table').addEventListener('click', (e) => {
      const td = e.target.closest('td.editable'); if (!td || td.querySelector('input')) return;
      const p = getCurrentPage(); const r=parseInt(td.dataset.r), c=parseInt(td.dataset.c);
      const current = c===-1 ? p.rows[r].name : p.rows[r].values[c]; td.innerHTML='';
      const input = document.createElement('input'); input.type='text'; input.value=current; input.className='cell-input'; input.inputMode='text';
      const finish = () => { const v=input.value.trim(); if(c===-1) p.rows[r].name=v||"Новый оператор"; else p.rows[r].values[c]=v; render(); saveData(); };
      input.addEventListener('blur', finish); input.addEventListener('keydown', ev => { if(ev.key==='Enter') input.blur(); if(ev.key==='Escape') render(); });
      td.appendChild(input); input.focus(); input.select();
    });

    document.getElementById('add-row-btn').onclick = () => { const p=getCurrentPage(); p.rows.push({name:"Новый оператор", values:new Array(p.headers.length).fill("")}); render(); saveData(); };
    document.getElementById('data-table').addEventListener('click', (e) => { if(e.target.closest('#add-col-btn')) { const n=prompt("Название столбца:", "Новый"); if(!n?.trim()) return; const p=getCurrentPage(); p.headers.push(n.trim()); p.rows.forEach(r=>r.values.push("")); render(); saveData(); }});
    window.deleteCol = (idx) => { const p=getCurrentPage(); if(p.headers.length<=1) return alert("Нельзя удалить последний столбец"); p.headers.splice(idx,1); p.rows.forEach(r=>r.values.splice(idx,1)); render(); saveData(); };
    document.getElementById('save-btn').onclick = () => saveData();

    // Инициализация
    if (Store.get('authenticated') === 'true') {
      document.getElementById('main-app').style.display = 'flex';
      document.getElementById('auth-overlay').style.display = 'none';
      render();
    }
  </script>
</body>
</html>
